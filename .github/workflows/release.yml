name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest   # needs .NET Framework csc.exe + WinForms/DataVisualization
    steps:
      - uses: actions/checkout@v4

      - name: Compile mousebat.exe
        shell: pwsh
        run: ./build.ps1 -OutDir .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mousebat
          path: mousebat.exe

      - name: Publish release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mousebat.exe
          generate_release_notes: true
